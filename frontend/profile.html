<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile – KrishiSetu</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/notifications.css" />
  <style>
    .profile-wrap { max-width: 900px; margin: 30px auto 60px; padding: 0 20px; }
    .profile-card {
      background: var(--white);
      border: 1px solid rgba(46,125,50,0.12);
      border-radius: var(--radius, 12px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      padding: 26px;
    }
    .profile-head { display: flex; align-items: center; gap: 14px; margin-bottom: 22px; }
    .profile-avatar {
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: var(--green-bg); font-size: 1.5rem;
    }
    .profile-title { font-size: 1.3rem; font-weight: 800; color: var(--green-dark); }
    .profile-sub { font-size: 0.86rem; color: var(--text-muted); }
    .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .profile-grid .full { grid-column: 1 / -1; }
    .readonly {
      display: block; width: 100%; padding: 11px 12px; border-radius: 8px;
      border: 1px solid #e0e0e0; background: #fafafa; color: var(--text-muted); font-size: 0.9rem;
    }
    .profile-actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
    .meta { margin-top: 16px; font-size: 0.82rem; color: var(--gray); }
    @media (max-width: 680px) { .profile-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<nav class="navbar" id="navbar" style="border-bottom:1px solid rgba(46,125,50,0.1);">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">🌾</div>
      <span class="logo-text">Krishi<span>Setu</span></span>
    </a>
    <div class="nav-actions" style="display:flex;gap:10px;">
      <a href="#" class="btn-login" id="profileDashboardLink">Dashboard</a>
      <a href="#" data-logout class="btn-register">Logout</a>
    </div>
  </div>
</nav>

<div class="profile-wrap">
  <div class="profile-card">
    <div class="profile-head">
      <div class="profile-avatar">👤</div>
      <div>
        <div class="profile-title">My Profile</div>
        <div class="profile-sub">View and update your KrishiSetu account details</div>
      </div>
    </div>

    <form id="profileForm">
      <div class="profile-grid">
        <div class="full form-group">
          <label class="form-label" for="profileName">Full Name</label>
          <input class="form-input" id="profileName" name="name" type="text" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="profileEmail">Email Address</label>
          <span class="readonly" id="profileEmail">-</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="profileRole">Role</label>
          <span class="readonly" id="profileRole">-</span>
        </div>

        <div class="full form-group">
          <label class="form-label" for="profilePhone">Mobile Number</label>
          <input class="form-input" id="profilePhone" name="phone" type="tel" placeholder="+91 XXXXX XXXXX" />
        </div>
      </div>

      <div class="profile-actions">
        <button type="submit" class="btn-auth-submit" id="saveBtn">Save Profile</button>
        <a href="#" class="btn-login" id="profileBackDashboardLink">Back to Dashboard</a>
      </div>
      <div class="meta" id="profileMeta"></div>
    </form>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
